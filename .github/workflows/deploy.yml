name: Private Server Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Code to Production Directory
        run: |
          # Copy everything from the runner workspace to the active app folder
          cp -r ./* /var/www/menu-app/

      - name: Install Dependencies & Update Database
        run: |
          cd /var/www/menu-app
          npm install --production
          PGPASSWORD='db_password' psql -h localhost -U db_user -d menu_db -f schema.sql

      - name: Restart App with PM2
        run: |
          cd /var/www/menu-app
          pm2 restart ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
          pm2 save